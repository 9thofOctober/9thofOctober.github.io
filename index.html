<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>재환 그리고 한결</title>
  
   <link href="https://cdn.jsdelivr.net/gh/sunn-us/SUITE/fonts/static/woff2/SUITE.css" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f8f4ec;
      /* 🎯 전체 사이트 글꼴을 공식 SUITE 체로 적용 */
      font-family: 'SUITE', sans-serif;
      width: 100%;
      min-height: 100%;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center; 
      justify-content: flex-start;
      padding: 30px 15px;
      box-sizing: border-box;
    }

    .main-wrapper {
      width: 100%;
      max-width: 480px; 
      display: flex;
      flex-direction: column;
      align-items: center; 
      justify-content: center;
      margin: 0 auto;
    }

    .mobile-center-box {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0 auto;
    }

    .mobile-center-box img {
      width: 100% !important;
      max-width: 100% !important;
      height: auto !important;
      display: block !important;
      margin: 0 auto 15px auto !important; 
      border-radius: 8px;
    }

    .flip-clock {
      display: flex !important;
      justify-content: center !important; 
      align-items: center !important;
      width: 100% !important;
      margin: 20px auto 40px auto !important; 
      font-size: 1.6rem;
      opacity: 0.85;
    }

    @media (max-width: 360px) { .flip-clock { font-size: 1.4rem; } }
    @media (min-width: 768px) { .flip-clock { font-size: 2.4rem; } }

    .flip-clock__piece {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0 6px;
    }

    .flip-clock__slot {
      font-size: 0.8rem;
      color: #82835f;
      margin-top: 8px;
      font-weight: 700;
      opacity: 0.9;
    }

    :root {
      --halfHeight: 0.9em; 
      --borderRadius: 0.15em;
    }

    .flip-card {
      position: relative;
      width: 1.7em;
      height: calc(var(--halfHeight) * 2);
      font-size: 1em;
      perspective: 300px; 
      font-weight: 700; /* 숫자 두께도 스위트체 굵은 700 두께로 세팅 */
    }

    .flip-card__top,
    .flip-card__bottom,
    .flip-card__back-top,
    .flip-card__back-bottom {
      position: absolute;
      left: 0;
      width: 100%;
      height: 50%;
      overflow: hidden;
      background: #82835f;
      color: #f8f4ec;
      box-sizing: border-box;
      display: flex;
      justify-content: center;
      backface-visibility: hidden; 
    }

    .flip-card__top,
    .flip-card__back-top {
      top: 0;
      align-items: flex-start;
      border-top-left-radius: 6px;
      border-top-right-radius: 6px;
      background: #767756; 
      border-bottom: 1px solid rgba(0,0,0,0.15);
      transform-origin: center bottom;
    }

    .flip-card__bottom,
    .flip-card__back-bottom {
      bottom: 0;
      align-items: flex-end;
      border-bottom-left-radius: 6px;
      border-bottom-right-radius: 6px;
      transform-origin: center top;
    }

    .flip-card__top-inner,
    .flip-card__bottom-inner {
      position: absolute;
      left: 0;
      width: 100%;
      height: calc(var(--halfHeight) * 2);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .flip-card__top-inner { top: 0; }
    .flip-card__bottom-inner { bottom: 0; }

    .flip-card__back-top {
      transform: rotateX(180deg);
      z-index: 2;
    }

    .flip .flip-card__top {
      animation: flipTop 0.4s ease-in forwards;
      z-index: 2;
    }

    .flip .flip-card__back-top {
      animation: flipBottom 0.4s 0.4s ease-out forwards;
    }

    @keyframes flipTop {
      0% { transform: rotateX(0deg); }
      100% { transform: rotateX(-90deg); }
    }

    @keyframes flipBottom {
      0% { transform: rotateX(90deg); }
      100% { transform: rotateX(0deg); }
    }
  </style>
</head>
<body>


  <!-- 🧱 모든 요소를 한 바구니에 담아 정중앙으로 밀어버리는 메인 랩퍼 박스 시작 -->
  <div class="main-wrapper">

    <!-- 1️⃣ 상단 이미지 배열 (01 밑에 02 정렬) -->
    <div class="mobile-center-box">
      <img src="./images/01.jpg" alt="01" style="margin-bottom: 160px !important;">
      <img src="./images/달력.jpg" alt="달력">
    </div>

    <!-- 2️⃣ 하단 정중앙 플립 클락 디데이 타이머 -->
    <div class="flip-clock" id="countdown">
      <!-- 일 -->
      <div class="flip-clock__piece" id="days">
        <div class="flip-card">
          <div class="flip-card__top">00</div>
          <div class="flip-card__bottom"><div class="flip-card__bottom-inner">00</div></div>
        </div>
        <span class="flip-clock__slot">일</span>
      </div>

      <!-- 시 -->
      <div class="flip-clock__piece" id="hours">
        <div class="flip-card">
          <div class="flip-card__top">00</div>
          <div class="flip-card__bottom"><div class="flip-card__bottom-inner">00</div></div>
        </div>
        <span class="flip-clock__slot">시</span>
      </div>

      <!-- 분 -->
      <div class="flip-clock__piece" id="minutes">
        <div class="flip-card">
          <div class="flip-card__top">00</div>
          <div class="flip-card__bottom"><div class="flip-card__bottom-inner">00</div></div>
        </div>
        <span class="flip-clock__slot">분</span>
      </div>

      <!-- 초 -->
      <div class="flip-clock__piece" id="seconds">
        <div class="flip-card">
          <div class="flip-card__top">00</div>
          <div class="flip-card__bottom"><div class="flip-card__bottom-inner">00</div></div>
        </div>
        <span class="flip-clock__slot">초</span>
      </div>
    </div>

  </div> <!-- 🧱 메인 랩퍼 박스 끝 -->

  <script>
    // 🎯 한국 시간(KST) 기준 2026년 10월 9일 오후 3시 정각 타깃 카운트다운 고정
    const targetDate = new Date("2026-10-09T15:00:00+09:00").getTime();

    function updateCard(cardId, newValue) {
      const piece = document.getElementById(cardId);
      if (!piece) return;
      
      const topElement = piece.querySelector('.flip-card__top');
      const bottomInner = piece.querySelector('.flip-card__bottom-inner');
      
      if (topElement.textContent !== newValue) {
        topElement.textContent = newValue;
        bottomInner.textContent = newValue;
      }
    }

    function format(num) {
      var str = String(num);
      return str.length < 2 ? '0' + str : str;
    }

    function tick() {
      const now = new Date().getTime();
      const diff = targetDate - now;

      if (diff <= 0) {
        clearInterval(intervalId);
        updateCard('days', '00');
        updateCard('hours', '00');
        updateCard('minutes', '00');
        updateCard('seconds', '00');
        return;
      }

      const d = Math.floor(diff / (1000 * 60 * 60 * 24));
      const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const s = Math.floor((diff % (1000 * 60)) / 1000);

      updateCard('days', format(d));
      updateCard('hours', format(h));
      updateCard('minutes', format(m));
      updateCard('seconds', format(s));
    }

    tick();
    const intervalId = setInterval(tick, 1000);
  </script>
</body>
</html>
