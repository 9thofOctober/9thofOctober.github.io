<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>플립 클락 디데이 타이머</title>
  
  <!-- SUITE 글꼴 로드 -->
  <link href="https://jsdelivr.net" rel="stylesheet">

  <style>
    html { 
      height: 100%; 
    }

    body { 
      min-height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f8f4ec;
      font-family: 'SUITE', sans-serif;
      font-weight: 700;
    }

    .flip-clock {
      text-align: center;
      perspective: 600px;
      margin: 0 auto;
    }

    .flip-clock *,
    .flip-clock *:before,
    .flip-clock *:after { 
      box-sizing: border-box; 
    }

    .flip-clock__piece {
      display: inline-block;
      margin: 0 0.5vw;
    }

    @media (min-width: 1000px) {
      .flip-clock__piece {
        margin: 0 8px;
      }
    }

    .flip-clock__slot {
      font-size: 0.75rem; 
      line-height: 1.5;
      display: block;
      color: #82835f;
      margin-top: 10px;
      font-weight: 600;
      letter-spacing: -0.3px;
      opacity: 0.85; 
    }

    :root {
      --halfHeight: 0.72em;
      --borderRadius: 0.15em;
    }

    .flip-card {
      display: block;
      position: relative;
      padding-bottom: var(--halfHeight);
      font-size: 2.5rem;
      line-height: 0.95;
    }

    @media (min-width: 1000px) {
      .flip-clock__slot { font-size: 0.85rem; } 
      .flip-card { font-size: 3.5rem; }
    }

    /* 💡 숫자를 수직·수평 정중앙으로 배치하기 위해 flexbox 레이아웃 적용 */
    .flip-card__top,
    .flip-card__bottom,
    .flip-card__back-bottom,
    .flip-card__back::before,
    .flip-card__back::after {
      display: flex;
      justify-content: center;
      align-items: flex-start; /* 상단 절반 카드는 위쪽 기준으로 정렬 */
      height: var(--halfHeight);
      color: #f8f4ec;
      background: #82835f;
      padding: 0; /* 기존 불균형한 패딩 제거 */
      border-radius: var(--borderRadius) var(--borderRadius) 0 0;
      backface-visibility: hidden;
      transform-style: preserve-3d;
      width: 1.8em;
      overflow: hidden;
    }

    /* 💡 하단 절반 카드는 아래쪽 기준으로 숫자가 이어지도록 정렬 */
    .flip-card__bottom,
    .flip-card__back-bottom {
      color: #f8f4ec;
      position: absolute;
      top: 50%;
      left: 0;
      border-top: solid 1px rgba(0, 0, 0, 0.15);
      background: #82835f;
      border-radius: 0 0 var(--borderRadius) var(--borderRadius);
      pointer-events: none;
      z-index: 2;
      align-items: flex-end; 
    }

    .flip-card__back-bottom {
      z-index: 1;
    }

    /* 💡 글자 위치 오프셋을 변수 크기에 맞춰 완벽하게 가로지르도록 계산 구현 */
    .flip-card__bottom::after,
    .flip-card__back-bottom::after {
      display: block;
      height: var(--halfHeight);
      line-height: calc(var(--halfHeight) * 2);
      transform: translateY(calc(-1 * var(--halfHeight)));
    }
    
    .flip-card__top {
      line-height: calc(var(--halfHeight) * 2);
    }

    .flip-card__back::before,
    .flip-card__bottom::after,
    .flip-card__back-bottom::after {
      content: attr(data-value);
    }

    .flip-card__back {
      position: absolute;
      top: 0;
      height: 100%;
      left: 0%;
      pointer-events: none;
    }

    .flip-card__back::before {
      position: relative;
      z-index: -1;
      line-height: calc(var(--halfHeight) * 2);
    }

    .flip .flip-card__back::before {
      z-index: 1;
      animation: flipTop 0.3s cubic-bezier(.37,.01,.94,.35);
      animation-fill-mode: both;
      transform-origin: center bottom;
    }

    .flip .flip-card__bottom {
      transform-origin: center top;
      animation-fill-mode: both;
      animation: flipBottom 0.6s cubic-bezier(.15,.45,.28,1);
    }

    @keyframes flipTop {
      0% { transform: rotateX(0deg); z-index: 2; }
      0%, 99% { opacity: 1; }
      100% { transform: rotateX(-90deg); opacity: 0; }
    }

    @keyframes flipBottom {
      0%, 50% { z-index: -1; transform: rotateX(90deg); opacity: 0; }
      51% { opacity: 1; }
      100% { opacity: 1; transform: rotateX(0deg); z-index: 5; }
    }
  </style>
</head>
<body>

  <div class="flip-clock" id="countdown">
    <!-- 일 -->
    <div class="flip-clock__piece" id="days">
      <div class="flip-card">
        <div class="flip-card__top">00</div>
        <div class="flip-card__bottom" data-value="00"></div>
        <div class="flip-card__back" data-value="00"></div>
        <div class="flip-card__back-bottom" data-value="00"></div>
      </div>
      <span class="flip-clock__slot">일</span>
    </div>

    <!-- 시 -->
    <div class="flip-clock__piece" id="hours">
      <div class="flip-card">
        <div class="flip-card__top">00</div>
        <div class="flip-card__bottom" data-value="00"></div>
        <div class="flip-card__back" data-value="00"></div>
        <div class="flip-card__back-bottom" data-value="00"></div>
      </div>
      <span class="flip-clock__slot">시</span>
    </div>

    <!-- 분 -->
    <div class="flip-clock__piece" id="minutes">
      <div class="flip-card">
        <div class="flip-card__top">00</div>
        <div class="flip-card__bottom" data-value="00"></div>
        <div class="flip-card__back" data-value="00"></div>
        <div class="flip-card__back-bottom" data-value="00"></div>
      </div>
      <span class="flip-clock__slot">분</span>
    </div>

    <!-- 초 -->
    <div class="flip-clock__piece" id="seconds">
      <div class="flip-card">
        <div class="flip-card__top">00</div>
        <div class="flip-card__bottom" data-value="00"></div>
        <div class="flip-card__back" data-value="00"></div>
        <div class="flip-card__back-bottom" data-value="00"></div>
      </div>
      <span class="flip-clock__slot">초</span>
    </div>
  </div>

  <script>
    // 🎯 한국 시간(KST) 기준 10월 9일 오후 3시(15시) 설정
    const targetDate = new Date("2026-10-09T15:00:00+09:00").getTime();

    function updateCard(cardId, newValue) {
      const piece = document.getElementById(cardId);
      if (!piece) return;
      
      const top = piece.querySelector('.flip-card__top');
      const bottom = piece.querySelector('.flip-card__bottom');
      const back = piece.querySelector('.flip-card__back');
      const backBottom = piece.querySelector('.flip-card__back-bottom');
      
      const currentValue = top.textContent;
      
      if (currentValue !== newValue) {
        back.setAttribute('data-value', currentValue);
        bottom.setAttribute('data-value', newValue);
        
        piece.classList.remove('flip');
        void piece.offsetWidth; 
        piece.classList.add('flip');
        
        top.textContent = newValue;
        backBottom.setAttribute('data-value', newValue);
      }
    }

    function tick() {
      const now = new Date().getTime();
      const diff = targetDate - 2026-10-09-15-00;

      if (diff <= 0) {
        clearInterval(intervalId);
        updateCard('days', '00');
        updateCard('hours', '00');
        updateCard('minutes', '00');
        updateCard('seconds', '00');
        return;
      }

      const d = Math.floor(diff / (1000 * 60 * 60 * 24));
      const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const s = Math.floor((diff % (1000 * 60)) / 1000);

function format(num) {
  var str = String(num);
  return str.length < 2 ? '0' + str : str;
}
      updateCard('days', format(d));
      updateCard('hours', format(h));
      updateCard('minutes', format(m));
      updateCard('seconds', format(s));
    }

    tick();
    const intervalId = setInterval(tick, 1000);
  </script>
</body>
</html>
</div>
