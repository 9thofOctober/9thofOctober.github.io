:root {
  /* 기존 가로 5.5vw 대비 10% 키운 6.05vw 설정 */
  --cardWidth: 6.05vw;     
  /* 기존 비율 대비 세로를 20% 추가 확장한 1.368배율 정밀 세팅 */
  --cardHeight: calc(var(--cardWidth) * 1.368); 
  --halfHeight: calc(var(--cardHeight) / 2);
}

@media (min-width: 768px) {
  :root {
    /* PC 환경 최대 폭도 10% 증가 반영 (27.5px -> 30.25px) */
    --cardWidth: 30.25px; 
  }
}

/* 플립 시계판 3D 박스 베이스 및 원근감 주입 */
.flip-card {
  position: relative;
  width: var(--cardWidth);
  height: var(--cardHeight);
  background: #9a9a7b;
  color: #f8f4ec;
  border-radius: 4px; 
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
  perspective: 200px; 
  transform-style: preserve-3d;
  -webkit-transform-style: preserve-3d;
  
  font-size: 0.9rem; 
  font-weight: 600;
  text-align: center;
}

.flip-clock__slot {
  font-size: 0.7rem;       /* 숫자 폰트 크기와 동일하게 매칭 */
  color: #9a9a7b;
  margin-top: 10px;       
  font-weight: 200;       /* 숫자와 동일한 슬림 굵기 500 적용 */
  opacity: 0.85; 
  letter-spacing: -0.2px; 
}

/* 모바일 3D 공간 상의 가림막 레이어 및 구조 정의 */
.flip-card__top,
.flip-card__bottom,
.flip-card__back-top,
.flip-card__back-bottom {
  position: absolute;
  left: 0;
  width: 100%;
  height: 50%;
  overflow: hidden;
  box-sizing: border-box;
  backface-visibility: hidden; 
  -webkit-backface-visibility: hidden; 
  display: flex;
  justify-content: center;
}

.flip-card__top,
.flip-card__back-top {
  top: 0;
  align-items: flex-start;
  border-top-left-radius: 4px;
  border-top-right-radius: 4px;
  background: rgba(118, 119, 86, 0.1);
  border-bottom: 1px solid rgba(0,0,0,0.1);
  line-height: var(--cardHeight); 
}

.flip-card__bottom,
.flip-card__back-bottom {
  bottom: 0;
  align-items: flex-end;
  border-bottom-left-radius: 4px;
  border-bottom-right-radius: 4px;
  background: rgba(130, 131, 95, 0.1);
}

.flip-card__bottom-inner,
.flip-card__back-bottom-inner {
  position: absolute;
  left: 0;
  bottom: 0;
  width: 100%;
  height: 200%; 
  display: flex;
  justify-content: center;
  align-items: center;
  line-height: var(--cardHeight); 
}

/* 모바일 입체 그래픽 보정 깊이(Z축 고정 수식) */
.flip-card__top {
  transform-origin: center bottom;
  transform: translateZ(3px); 
  z-index: 4;
}

.flip-card__back-bottom {
  transform-origin: center top;
  transform: rotateX(180deg) translateZ(2px); 
  z-index: 3;
}

.flip-card__back-top { 
  transform: translateZ(1px);
  z-index: 2; 
}

.flip-card__bottom { 
  transform: translateZ(0px);
  z-index: 1; 
}

/* 🎬 낙하 모션 애니메이션 타임 설정 */
.flip .flip-card__top {
  animation: flipTop 0.3s cubic-bezier(.4, 0, 1, 1) forwards;
}

.flip .flip-card__back-bottom {
  animation: flipBottom 0.3s 0.3s cubic-bezier(0, 0, .2, 1) forwards;
}

@keyframes flipTop {
  0% { transform: rotateX(0deg) translateZ(3px); }
  100% { transform: rotateX(-90deg) translateZ(3px); }
}

@keyframes flipBottom {
  0% { 
    transform: rotateX(90deg) translateZ(2px); 
    opacity: 0; 
  }
  49% {
    opacity: 0; 
  }
  50% { 
    opacity: 1; 
  }
  100% { 
    transform: rotateX(0deg) translateZ(2px); 
    opacity: 1; 
  }

}

/* 플립클락 정중앙 정렬 방어벽 */

  <script>
    // 🎯 한국 시간(KST) 기준 2026년 10월 9일 오후 3시 정각 타깃 카운트다운 고정
    const targetDate = new Date("2026-10-09T15:00:00+09:00").getTime();

function updateCard(cardId, newValue) {
  const piece = document.getElementById(cardId);
  if (!piece) return;
  
  const top = piece.querySelector('.flip-card__top');
  const bottomInner = piece.querySelector('.flip-card__bottom-inner');
  const backTop = piece.querySelector('.flip-card__back-top');
  const backBottomInner = piece.querySelector('.flip-card__back-bottom-inner');
  
  const currentValue = top.textContent;
  
  if (currentValue !== newValue) {
    backTop.textContent = newValue;
    bottomInner.textContent = newValue;
    
    piece.classList.remove('flip');
    void piece.offsetWidth; 
    piece.classList.add('flip');
    
    setTimeout(function() {
      top.textContent = newValue;
      backBottomInner.textContent = newValue;
    }, 350);
  }
}


    function format(num) {

        updateCard('days', '00');
        updateCard('hours', '00');
        updateCard('minutes', '00');
        updateCard('seconds', '00');
        return;

      const d = Math.floor(diff / (1000 * 60 * 60 * 24));
      const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const s = Math.floor((diff % (1000 * 60)) / 1000);

      updateCard('days', format(d));
      updateCard('hours', format(h));
      updateCard('minutes', format(m));
      updateCard('seconds', format(s));
    }

    tick();
    const intervalId = setInterval(tick, 1000);
  </script>
