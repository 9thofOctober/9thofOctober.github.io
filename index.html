<!DOCTYPE html>
<html lang="ko"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>재환 그리고 한결</title>
  
   <link href="https://cdn.jsdelivr.net/gh/sunn-us/SUITE/fonts/static/woff2/SUITE.css" rel="stylesheet">

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>플립 클락 디데이 타이머</title>
  
  <!-- 🎯 SUITE 글꼴 정상 로드 주소 추가 -->
  <link href="https://jsdelivr.net" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f8f4ec;
      font-family: 'SUITE', sans-serif;
      width: 100%;
      min-height: 100%;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center; 
      justify-content: flex-start;
      padding: 30px 15px;
      box-sizing: border-box;
    }

    .main-wrapper {
      width: 100%;
      max-width: 480px; 
      display: flex;
      flex-direction: column;
      align-items: center; 
      justify-content: center;
      margin: 0 auto;
    }

    .mobile-center-box {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0 auto;
    }

    .mobile-center-box img {
      width: 100% !important;
      max-width: 100% !important;
      height: auto !important;
      display: block !important;
      margin: 0 auto 15px auto !important; 
      border-radius: 8px;
    }

    .flip-clock {
      display: flex !important;
      justify-content: center !important; 
      align-items: center !important;
      width: 100% !important;
      margin: 20px auto 40px auto !important; 
      font-size: 1.6rem;
    }

    @media (max-width: 360px) { .flip-clock { font-size: 1.4rem; } }
    @media (min-width: 768px) { .flip-clock { font-size: 2.4rem; } }

    .flip-clock__piece {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0 6px;
    }

    .flip-clock__slot {
      font-size: 0.75rem; /* 💡 시각적 안정감을 위해 크기 축소 조율 */
      color: #82835f;
      margin-top: 10px;
      font-weight: 600;
      letter-spacing: -0.3px;
      opacity: 0.85;
    }

    :root {
      /* 💡 세로 길이를 더 길게 늘리기 위해 기존 0.72em에서 0.9em으로 확장 */
      --halfHeight: 0.9em; 
      --borderRadius: 0.15em;
    }

    .flip-card {
      position: relative;
      width: 1.8em;
      height: calc(var(--halfHeight) * 2);
      /* 💡 숫자 크기를 이전 대비 70% 수준인 1.75rem으로 조절 */
      font-size: 1.75rem; 
      perspective: 600px; 
      font-weight: 700;
    }

    @media (min-width: 1000px) {
      .flip-card { font-size: 2.45rem; } /* 💡 PC 스케일도 원래 의도하신 70% 비율 유지 */
    }

    /* 💡 숫자를 수직·수평 완벽한 정가운데로 세팅하기 위한 flexbox 오프셋 통합 정렬 */
    .flip-card__top,
    .flip-card__bottom,
    .flip-card__back-bottom,
    .flip-card__back::before,
    .flip-card__back::after {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      position: absolute;
      left: 0;
      width: 100%;
      height: 50%;
      overflow: hidden;
      color: #f8f4ec;
      background: #82835f;
      box-sizing: border-box;
      backface-visibility: hidden; 
      transform-style: preserve-3d;
      padding: 0;
      /* 💡 요청하신 전체 카드 불투명도 80% 세팅 */
      opacity: 0.8; 
    }

    .flip-card__top,
    .flip-card__back::before {
      top: 0;
      border-top-left-radius: var(--borderRadius);
      border-top-right-radius: var(--borderRadius);
      background: #82835f; 
      line-height: calc(var(--halfHeight) * 2);
    }

    .flip-card__bottom,
    .flip-card__back-bottom {
      bottom: 0;
      align-items: flex-end;
      border-bottom-left-radius: var(--borderRadius);
      border-bottom-right-radius: var(--borderRadius);
      border-top: solid 1px rgba(0, 0, 0, 0.15); /* 은은한 중간 절취선 */
      background: #82835f;
      z-index: 2;
    }

    .flip-card__back-bottom {
      z-index: 1;
    }

    /* 💡 숫자가 작아져도 상·하단 카드를 유기적으로 관통해 정중앙 고정되도록 오프셋 계산 */
    .flip-card__bottom::after,
    .flip-card__back-bottom::after {
      display: block;
      height: var(--halfHeight);
      line-height: calc(var(--halfHeight) * 2);
      transform: translateY(calc(-1 * var(--halfHeight)));
    }

    .flip-card__back {
      position: absolute;
      top: 0;
      height: 100%;
      left: 0;
      width: 100%;
      pointer-events: none;
    }

    .flip-card__back::before {
      content: attr(data-value);
      position: relative;
      z-index: -1;
    }

    .flip-card__bottom::after,
    .flip-card__back-bottom::after {
      content: attr(data-value);
    }

    /* 🎬 정교한 플립 애니메이션 엔진 트리거 */
    .flip .flip-card__back::before {
      z-index: 1;
      animation: flipTop 0.3s cubic-bezier(.37,.01,.94,.35);
      animation-fill-mode: both;
      transform-origin: center bottom;
    }

    .flip .flip-card__bottom {
      transform-origin: center top;
      animation-fill-mode: both;
      animation: flipBottom 0.6s cubic-bezier(.15,.45,.28,1);
    }

    @keyframes flipTop {
      0% { transform: rotateX(0deg); z-index: 2; }
      0%, 99% { opacity: 1; }
      100% { transform: rotateX(-90deg); opacity: 0; }
    }

    @keyframes flipBottom {
      0%, 50% { z-index: -1; transform: rotateX(90deg); opacity: 0; }
      51% { opacity: 1; }
      100% { opacity: 1; transform: rotateX(0deg); z-index: 5; }
    }
  </style>
</head>
<body>

  <div class="main-wrapper">

    <!-- 1️⃣ 상단 이미지 배열 (원본 구조 보존) -->
    <div class="mobile-center-box">
      <img src="./images/01.jpg" alt="01" style="margin-bottom: 160px !important;">
      <img src="./images/달력.jpg" alt="달력">
    </div>

    <!-- 2️⃣ 하단 정중앙 플립 클락 타이머 (정밀 애니메이션 구조로 마크업 보강) -->
    <div class="flip-clock" id="countdown">
      <!-- 일 -->
      <div class="flip-clock__piece" id="days">
        <div class="flip-card">
          <div class="flip-card__top">00</div>
          <div class="flip-card__bottom" data-value="00"></div>
          <div class="flip-card__back" data-value="00"></div>
          <div class="flip-card__back-bottom" data-value="00"></div>
        </div>
        <span class="flip-clock__slot">일</span>
      </div>

      <!-- 시 -->
      <div class="flip-clock__piece" id="hours">
        <div class="flip-card">
          <div class="flip-card__top">00</div>
          <div class="flip-card__bottom" data-value="00"></div>
          <div class="flip-card__back" data-value="00"></div>
          <div class="flip-card__back-bottom" data-value="00"></div>
        </div>
        <span class="flip-clock__slot">시</span>
      </div>

      <!-- 분 -->
      <div class="flip-clock__piece" id="minutes">
        <div class="flip-card">
          <div class="flip-card__top">00</div>
          <div class="flip-card__bottom" data-value="00"></div>
          <div class="flip-card__back" data-value="00"></div>
          <div class="flip-card__back-bottom" data-value="00"></div>
        </div>
        <span class="flip-clock__slot">분</span>
      </div>

      <!-- 초 -->
      <div class="flip-clock__piece" id="seconds">
        <div class="flip-card">
          <div class="flip-card__top">00</div>
          <div class="flip-card__bottom" data-value="00"></div>
          <div class="flip-card__back" data-value="00"></div>
          <div class="flip-card__back-bottom" data-value="00"></div>
        </div>
        <span class="flip-clock__slot">초</span>
      </div>
    </div>

  </div>

  <script>
    // 🎯 한국 시간(KST) 기준 2026년 10월 9일 오후 3시 정각 타깃 카운트다운 고정
    const targetDate = new Date("2026-10-09T15:00:00+09:00").getTime();

    function updateCard(cardId, newValue) {
      const piece = document.getElementById(cardId);
      if (!piece) return;
      
      const top = piece.querySelector('.flip-card__top');
      const bottom = piece.querySelector('.flip-card__bottom');
      const back = piece.querySelector('.flip-card__back');
      const backBottom = piece.querySelector('.flip-card__back-bottom');
      
      const currentValue = top.textContent;
      
      if (currentValue !== newValue) {
        back.setAttribute('data-value', currentValue);
        bottom.setAttribute('data-value', newValue);
        
        piece.classList.remove('flip');
        void piece.offsetWidth; // 리플로우 연산으로 플립 애니메이션 초기화
        piece.classList.add('flip');
        
        top.textContent = newValue;
        backBottom.setAttribute('data-value', newValue);
      }
    }

    // 💡 안전하고 직관적인 전역 포맷 스코프 정의 (충돌 원천 차단)
    function formatNumber(num) {
      var str = String(num);
      return str.length < 2 ? '0' + str : str;
    }

    function tick() {
      const now = new Date().getTime();
      const diff = targetDate - now;

      if (diff <= 0) {
        clearInterval(intervalId);
        updateCard('days', '00');
        updateCard('hours', '00');
        updateCard('minutes', '00');
        updateCard('seconds', '00');
        return;
      }

      const d = Math.floor(diff / (1000 * 60 * 60 * 24));
      const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const s = Math.floor((diff % (1000 * 60)) / 1000);

      updateCard('days', formatNumber(d));
      updateCard('hours', formatNumber(h));
      updateCard('minutes', formatNumber(m));
      updateCard('seconds', formatNumber(s));
    }

    tick();
    const intervalId = setInterval(tick, 1000);
  </script>
</body>
</html>
