<!DOCTYPE html>
<html lang="ko"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
   <title>재환 그리고 한결</title>
 
  <!-- 구글 눈고딕/본고딕 KR 폰트 로드 -->
  <link rel="preconnect" href="https://googleapis.com">
  <link rel="preconnect" href="https://gstatic.com" crossorigin>
  <link href="https://googleapis.com/css2?family=Noto+Sans+KR:wght@700&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f8f4ec;
      font-family: 'Noto Sans KR', sans-serif;
      width: 100%;
      min-height: 100%;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center; 
      justify-content: flex-start;
      padding: 30px 15px;
      box-sizing: border-box;
    }

    /* 🧱 최외곽 랩퍼: 전체 콘텐츠를 꽉 묶어서 한 번 더 가운데로 밀어주는 방어벽 */
    .main-wrapper {
      width: 100%;
      max-width: 480px; /* 모바일 가로폭 최적화 규격 */
      display: flex;
      flex-direction: column;
      align-items: center; /* 💡 내부에 들어오는 모든 요소를 한가운데로 정렬 */
      justify-content: center;
      margin: 0 auto;
    }

   .mobile-center-box {
  width: 100%;
  display: flex !important;           
  flex-direction: column !important;   
  align-items: center !important;      
  margin: 0 auto;
}

    .mobile-center-box img {
      width: 100% !important;
      max-width: 100% !important;
      height: auto !important;
      display: block !important;
      margin: 0 auto 15px auto !important; /* 💡 좌우 마진 auto로 완벽 정중앙 고정 */
      border-radius: 8px;
    }

    .flip-clock {
      display: flex !important;
      justify-content: center !important; /* 💡 타이머 내부 세트들을 정중앙으로 밀집 */
      align-items: center !important;
      width: 100% !important;
      margin: 20px 0 auto !important; /* 💡 타이머 자체를 가로 한가운데 고정 */
      font-size: 2.2rem;
	  display: flex !important;
      clear: both !important; 
      float: none !important;
    }
    }

    /* 화면이 아주 작은 구형 스마트폰 대응 글자 크기 최적화 수식 */
    @media (max-width: 360px) {
      .flip-clock { font-size: 1.8rem; }
    }

    @media (min-width: 768px) {
      .flip-clock { font-size: 3.2rem; }
    }

    .flip-clock__piece {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0 6px;
    }

  .flip-clock__slot {
  font-size: 0.6rem;
  color: #82835f;
  margin-top: 12px;
  font-weight: 200;
  opacity: 0.65;
  letter-spacing: -0.2px;
}


:root {
  /* 기존 가로 5.5vw 대비 10% 키운 6.05vw 설정 */
  --cardWidth: 6.05vw;     
  /* 기존 비율 대비 세로를 20% 추가 확장한 1.368배율 정밀 세팅 */
  --cardHeight: calc(var(--cardWidth) * 1.368); 
  --halfHeight: calc(var(--cardHeight) / 2);
}

@media (min-width: 768px) {
  :root {
    /* PC 환경 최대 폭도 10% 증가 반영 (27.5px -> 30.25px) */
    --cardWidth: 30.25px; 
  }
}

/* 플립 시계판 3D 박스 베이스 및 원근감 주입 */
.flip-card {
  position: relative;
  width: var(--cardWidth);
  height: var(--cardHeight);
  background: #82835f;
  color: #f8f4ec;
  border-radius: 4px; 
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
  perspective: 200px; 
  transform-style: preserve-3d;
  -webkit-transform-style: preserve-3d;
  
  font-size: 0.9rem; 
  font-weight: 600;
  text-align: center;
}

.flip-clock__slot {
  font-size: 0.7rem;       /* 숫자 폰트 크기와 동일하게 매칭 */
  color: #82835f;
  margin-top: 10px;       
  font-weight: 200;       /* 숫자와 동일한 슬림 굵기 500 적용 */
  opacity: 0.85; 
  letter-spacing: -0.2px; 
}

/* 모바일 3D 공간 상의 가림막 레이어 및 구조 정의 */
.flip-card__top,
.flip-card__bottom,
.flip-card__back-top,
.flip-card__back-bottom {
  position: absolute;
  left: 0;
  width: 100%;
  height: 50%;
  overflow: hidden;
  box-sizing: border-box;
  backface-visibility: hidden; 
  -webkit-backface-visibility: hidden; 
  display: flex;
  justify-content: center;
}

.flip-card__top,
.flip-card__back-top {
  top: 0;
  align-items: flex-start;
  border-top-left-radius: 4px;
  border-top-right-radius: 4px;
  background: rgba(118, 119, 86, 0.1);
  border-bottom: 1px solid rgba(0,0,0,0.1);
  line-height: var(--cardHeight); 
}

.flip-card__bottom,
.flip-card__back-bottom {
  bottom: 0;
  align-items: flex-end;
  border-bottom-left-radius: 4px;
  border-bottom-right-radius: 4px;
  background: rgba(130, 131, 95, 0.1);
}

.flip-card__bottom-inner,
.flip-card__back-bottom-inner {
  position: absolute;
  left: 0;
  bottom: 0;
  width: 100%;
  height: 200%; 
  display: flex;
  justify-content: center;
  align-items: center;
  line-height: var(--cardHeight); 
}

/* 모바일 입체 그래픽 보정 깊이(Z축 고정 수식) */
.flip-card__top {
  transform-origin: center bottom;
  transform: translateZ(3px); 
  z-index: 4;
}

.flip-card__back-bottom {
  transform-origin: center top;
  transform: rotateX(180deg) translateZ(2px); 
  z-index: 3;
}

.flip-card__back-top { 
  transform: translateZ(1px);
  z-index: 2; 
}

.flip-card__bottom { 
  transform: translateZ(0px);
  z-index: 1; 
}

/* 🎬 낙하 모션 애니메이션 타임 설정 */
.flip .flip-card__top {
  animation: flipTop 0.3s cubic-bezier(.4, 0, 1, 1) forwards;
}

.flip .flip-card__back-bottom {
  animation: flipBottom 0.3s 0.3s cubic-bezier(0, 0, .2, 1) forwards;
}

@keyframes flipTop {
  0% { transform: rotateX(0deg) translateZ(3px); }
  100% { transform: rotateX(-90deg) translateZ(3px); }
}

@keyframes flipBottom {
  0% { 
    transform: rotateX(90deg) translateZ(2px); 
    opacity: 0; 
  }
  49% {
    opacity: 0; 
  }
  50% { 
    opacity: 1; 
  }
  100% { 
    transform: rotateX(0deg) translateZ(2px); 
    opacity: 1; 
  }
}


  </style>
</head>
<body>

  <div class="main-wrapper">

    <div class="mobile-center-box">
      <img src="./images/01.jpg" alt="01" style="margin-bottom: 120px !important;">
      <img src="./images/달력.jpg" alt="달력">
    </div>

    <div class="flip-clock" id="countdown" style="margin-bottom: 120px !important;">
      <div class="flip-clock__piece" id="days">
        <div class="flip-card">
          <div class="flip-card__top">00</div>
  <div class="flip-card__bottom"><div class="flip-card__bottom-inner">00</div></div>
  <div class="flip-card__back-top">00</div>
  <div class="flip-card__back-bottom"><div class="flip-card__back-bottom-inner">00</div></div>
        </div>
        <span class="flip-clock__slot">일</span>
      </div>

      <div class="flip-clock__piece" id="hours">
        <div class="flip-card">
          <div class="flip-card__top">00</div>
  <div class="flip-card__bottom"><div class="flip-card__bottom-inner">00</div></div>
  <div class="flip-card__back-top">00</div>
  <div class="flip-card__back-bottom"><div class="flip-card__back-bottom-inner">00</div></div>
        </div>
        <span class="flip-clock__slot">시</span>
      </div>

      <div class="flip-clock__piece" id="minutes">
        <div class="flip-card">
          <div class="flip-card__top">00</div>
  <div class="flip-card__bottom"><div class="flip-card__bottom-inner">00</div></div>
  <div class="flip-card__back-top">00</div>
  <div class="flip-card__back-bottom"><div class="flip-card__back-bottom-inner">00</div></div>
        </div>
        <span class="flip-clock__slot">분</span>
      </div>

      <div class="flip-clock__piece" id="seconds">
        <div class="flip-card">
          <div class="flip-card__top">00</div>
          <div class="flip-card__bottom"><div class="flip-card__bottom-inner">00</div></div>
          <div class="flip-card__back-top">00</div>
          <div class="flip-card__back-bottom"><div class="flip-card__back-bottom-inner">00</div></div>
        </div>
        <span class="flip-clock__slot">초</span>
      </div>
    </div>
      
    <div class="mobile-center-box">
      <img src="./images/03.jpg" alt="03">
    </div>

  </div>

  <script>
    // 🎯 한국 시간(KST) 기준 2026년 10월 9일 오후 3시 정각 타깃 카운트다운 고정
    const targetDate = new Date("2026-10-09T15:00:00+09:00").getTime();

function updateCard(cardId, newValue) {
  const piece = document.getElementById(cardId);
  if (!piece) return;
  
  const top = piece.querySelector('.flip-card__top');
  const bottomInner = piece.querySelector('.flip-card__bottom-inner');
  const backTop = piece.querySelector('.flip-card__back-top');
  const backBottomInner = piece.querySelector('.flip-card__back-bottom-inner');
  
  const currentValue = top.textContent;
  
  if (currentValue !== newValue) {
    backTop.textContent = newValue;
    bottomInner.textContent = newValue;
    
    piece.classList.remove('flip');
    void piece.offsetWidth; 
    piece.classList.add('flip');
    
    setTimeout(function() {
      top.textContent = newValue;
      backBottomInner.textContent = newValue;
    }, 350);
  }
}


    function format(num) {
      var str = String(num);
      return str.length < 2 ? '0' + str : str;
    }

    function tick() {
      const now = new Date().getTime();
      const diff = targetDate - now;

      if (diff <= 0) {
        clearInterval(intervalId);
        updateCard('days', '00');
        updateCard('hours', '00');
        updateCard('minutes', '00');
        updateCard('seconds', '00');
        return;
      }

      const d = Math.floor(diff / (1000 * 60 * 60 * 24));
      const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const s = Math.floor((diff % (1000 * 60)) / 1000);

      updateCard('days', format(d));
      updateCard('hours', format(h));
      updateCard('minutes', format(m));
      updateCard('seconds', format(s));
    }

    tick();
    const intervalId = setInterval(tick, 1000);
  </script>
</body>
</html>
