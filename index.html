<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>재환 그리고 한결</title>
  
  <!-- 구글 눈고딕/본고딕 KR 폰트 로드 -->
  <link rel="preconnect" href="https://googleapis.com">
  <link rel="preconnect" href="https://gstatic.com" crossorigin>
  <link href="https://googleapis.com/css2?family=Noto+Sans+KR:wght@700&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f8f4ec;
      font-family: 'Noto Sans KR', sans-serif;
      width: 100%;
      min-height: 100%;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center; /* 💡 바디 전체의 자식 요소를 가로 기준 무조건 정중앙 정렬 */
      justify-content: flex-start;
      padding: 30px 15px;
      box-sizing: border-box;
    }

    /* 🧱 최외곽 랩퍼: 전체 콘텐츠를 꽉 묶어서 한 번 더 가운데로 밀어주는 방어벽 */
    .main-wrapper {
      width: 100%;
      max-width: 480px; /* 모바일 가로폭 최적화 규격 */
      display: flex;
      flex-direction: column;
      align-items: center; /* 💡 내부에 들어오는 모든 요소를 한가운데로 정렬 */
      justify-content: center;
      margin: 0 auto;
    }

    /* 🖼️ 상단 이미지 정렬 영역 */
    .mobile-center-box {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0 auto;
    }

    .mobile-center-box img {
      width: 100% !important;
      max-width: 100% !important;
      height: auto !important;
      display: block !important;
      margin: 0 auto 15px auto !important; /* 💡 좌우 마진 auto로 완벽 정중앙 고정 */
      border-radius: 8px;
    }

    /* ⏰ 하단 플립 클락 타이머 영역 */
    .flip-clock {
      display: flex !important;
      justify-content: center !important; /* 💡 타이머 내부 세트들을 정중앙으로 밀집 */
      align-items: center !important;
      width: 100% !important;
      margin: 20px auto 40px auto !important; /* 💡 타이머 자체를 가로 한가운데 고정 */
      font-size: 1.6rem;
    }

    /* 화면이 아주 작은 구형 스마트폰 대응 글자 크기 최적화 수식 */
    @media (max-width: 360px) {
      .flip-clock { font-size: 1.4rem; }
    }

    @media (min-width: 768px) {
      .flip-clock { font-size: 2.4rem; }
    }

    .flip-clock__piece {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0 6px;
    }

    .flip-clock__slot {
      font-size: 0.8rem;
      color: #82835f;
      margin-top: 8px;
      font-weight: 700;
      opacity: 0.9;
    }

    /* 플립 시계판 3D 박스 베이스 */
    .flip-card {
      position: relative;
      width: 1.7em;
      height: 1.3em;
      line-height: 1.3em;
      text-align: center;
      background: #82835f;
      color: #f8f4ec;
      border-radius: 6px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    }

    .flip-card__top,
    .flip-card__bottom {
      position: absolute;
      left: 0;
      width: 100%;
      height: 50%;
      overflow: hidden;
      box-sizing: border-box;
      backface-visibility: hidden;
    }

    .flip-card__top {
      top: 0;
      border-top-left-radius: 6px;
      border-top-right-radius: 6px;
      background: #767756;
      border-bottom: 1px solid rgba(0,0,0,0.1);
    }

    .flip-card__bottom {
      bottom: 0;
      border-bottom-left-radius: 6px;
      border-bottom-right-radius: 6px;
      line-height: 0;
    }

    .flip-card__bottom-inner {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 200%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>

  <!-- 🧱 모든 요소를 한 바구니에 담아 정중앙으로 밀어버리는 메인 랩퍼 박스 시작 -->
  <div class="main-wrapper">

    <!-- 1️⃣ 상단 이미지 배열 (01 밑에 02 정렬) -->
    <div class="mobile-center-box">
      <img src="./images/01.jpg" alt="01">
      <img src="./images/달력.jpg" alt="달력">
    </div>

    <!-- 2️⃣ 하단 정중앙 플립 클락 디데이 타이머 -->
    <div class="flip-clock" id="countdown">
      <!-- 일 -->
      <div class="flip-clock__piece" id="days">
        <div class="flip-card">
          <div class="flip-card__top">00</div>
          <div class="flip-card__bottom"><div class="flip-card__bottom-inner">00</div></div>
        </div>
        <span class="flip-clock__slot">일</span>
      </div>

      <!-- 시 -->
      <div class="flip-clock__piece" id="hours">
        <div class="flip-card">
          <div class="flip-card__top">00</div>
          <div class="flip-card__bottom"><div class="flip-card__bottom-inner">00</div></div>
        </div>
        <span class="flip-clock__slot">시</span>
      </div>

      <!-- 분 -->
      <div class="flip-clock__piece" id="minutes">
        <div class="flip-card">
          <div class="flip-card__top">00</div>
          <div class="flip-card__bottom"><div class="flip-card__bottom-inner">00</div></div>
        </div>
        <span class="flip-clock__slot">분</span>
      </div>

      <!-- 초 -->
      <div class="flip-clock__piece" id="seconds">
        <div class="flip-card">
          <div class="flip-card__top">00</div>
          <div class="flip-card__bottom"><div class="flip-card__bottom-inner">00</div></div>
        </div>
        <span class="flip-clock__slot">초</span>
      </div>
    </div>

  </div> <!-- 🧱 메인 랩퍼 박스 끝 -->

  <script>
    // 🎯 한국 시간(KST) 기준 2026년 10월 9일 오후 3시 정각 타깃 카운트다운 고정
    const targetDate = new Date("2026-10-09T15:00:00+09:00").getTime();

    function updateCard(cardId, newValue) {
      const piece = document.getElementById(cardId);
      if (!piece) return;
      
      const topElement = piece.querySelector('.flip-card__top');
      const bottomInner = piece.querySelector('.flip-card__bottom-inner');
      
      if (topElement.textContent !== newValue) {
        topElement.textContent = newValue;
        bottomInner.textContent = newValue;
      }
    }

    function format(num) {
      var str = String(num);
      return str.length < 2 ? '0' + str : str;
    }

    function tick() {
      const now = new Date().getTime();
      const diff = targetDate - now;

      if (diff <= 0) {
        clearInterval(intervalId);
        updateCard('days', '00');
        updateCard('hours', '00');
        updateCard('minutes', '00');
        updateCard('seconds', '00');
        return;
      }

      const d = Math.floor(diff / (1000 * 60 * 60 * 24));
      const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const s = Math.floor((diff % (1000 * 60)) / 1000);

      updateCard('days', format(d));
      updateCard('hours', format(h));
      updateCard('minutes', format(m));
      updateCard('seconds', format(s));
    }

    tick();
    const intervalId = setInterval(tick, 1000);
  </script>
</body>
</html>
